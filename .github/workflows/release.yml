name: Release Portables

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: trix-portable-windows-x86_64.zip
            ext: ".exe"
            ffmpeg_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-win-64.zip"
            ffprobe_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-win-64.zip"
            archive_cmd: "7z a trix-portable-windows-x86_64.zip trix-portable-windows-x86_64"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: trix-portable-linux-x86_64.tar.gz
            ext: ""
            ffmpeg_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-linux-64.zip"
            ffprobe_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-linux-64.zip"
            archive_cmd: "tar -czf trix-portable-linux-x86_64.tar.gz trix-portable-linux-x86_64"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: trix-portable-macos-x86_64.zip
            ext: ""
            ffmpeg_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-osx-64.zip"
            ffprobe_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-osx-64.zip"
            archive_cmd: "zip -r trix-portable-macos-x86_64.zip trix-portable-macos-x86_64"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: trix-portable-macos-aarch64.zip
            ext: ""
            ffmpeg_url: "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
            ffprobe_url: "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffprobe.zip"
            archive_cmd: "zip -r trix-portable-macos-aarch64.zip trix-portable-macos-aarch64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Build Rust binary
        run: cargo build --release --manifest-path src-rs/Cargo.toml --target ${{ matrix.target }}

      # Download static ffmpeg and ffprobe and package the folder
      - name: Download ffmpeg/ffprobe and Package
        run: |
          # 1. Create a clean folder for the portable package
          FOLDER_NAME="${{ matrix.artifact_name }}"
          FOLDER_NAME="${FOLDER_NAME%.zip}"
          FOLDER_NAME="${FOLDER_NAME%.tar.gz}"
          mkdir -p $FOLDER_NAME

          # 2. Copy the compiled trix binary
          cp src-rs/target/${{ matrix.target }}/release/trix${{ matrix.ext }} $FOLDER_NAME/

          # 3. Download and extract ffmpeg/ffprobe
          curl -L -o ffmpeg_dl ${{ matrix.ffmpeg_url }}
          curl -L -o ffprobe_dl ${{ matrix.ffprobe_url }}

          # Check file type/extension to extract properly
          if [[ "${{ matrix.ffmpeg_url }}" == *.zip ]] || [[ "${{ matrix.target }}" == *darwin* ]]; then
            unzip -o ffmpeg_dl -d $FOLDER_NAME/
            unzip -o ffprobe_dl -d $FOLDER_NAME/
          elif [[ "${{ matrix.ffmpeg_url }}" == *.tar.xz ]]; then
            tar -xf ffmpeg_dl -C $FOLDER_NAME/
            tar -xf ffprobe_dl -C $FOLDER_NAME/
          fi

          # Clean up download files
          rm -f ffmpeg_dl ffprobe_dl

          # Make sure binaries are executable on Unix systems
          if [ "${{ matrix.ext }}" = "" ]; then
            chmod +x $FOLDER_NAME/trix $FOLDER_NAME/ffmpeg $FOLDER_NAME/ffprobe
          fi

          # 4. Archive the folder using the matrix command
          ${{ matrix.archive_cmd }}
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
