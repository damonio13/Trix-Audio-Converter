name: Release Portables

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: trix-portable-windows-x86_64.zip
            ext: ".exe"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: trix-portable-linux-x86_64.tar.gz
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: trix-portable-macos-x86_64.zip
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: trix-portable-macos-aarch64.zip
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Build Rust binary
        run: cargo build --release --manifest-path src-rs/Cargo.toml --target ${{ matrix.target }}

      # Packaging
      - name: Package Windows Portable
        if: matrix.os == 'windows-latest'
        run: |
          mkdir trix-portable-windows-x86_64
          cp src-rs/target/x86_64-pc-windows-msvc/release/trix.exe trix-portable-windows-x86_64/
          cp -r dist trix-portable-windows-x86_64/
          echo "portable" > trix-portable-windows-x86_64/portable.txt
          Compress-Archive -Path trix-portable-windows-x86_64/* -DestinationPath ${{ matrix.artifact_name }}
        shell: pwsh

      - name: Package Linux Portable
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir trix-portable-linux-x86_64
          cp src-rs/target/x86_64-unknown-linux-gnu/release/trix trix-portable-linux-x86_64/
          cp -r dist trix-portable-linux-x86_64/
          echo "portable" > trix-portable-linux-x86_64/portable.txt
          tar -czf ${{ matrix.artifact_name }} -C trix-portable-linux-x86_64 .
        shell: bash

      - name: Package macOS Portable
        if: matrix.os == 'macos-latest'
        run: |
          FOLDER_NAME="trix-portable-macos-x86_64"
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            FOLDER_NAME="trix-portable-macos-aarch64"
          fi
          mkdir -p $FOLDER_NAME
          cp src-rs/target/${{ matrix.target }}/release/trix $FOLDER_NAME/
          cp -r dist $FOLDER_NAME/
          echo "portable" > $FOLDER_NAME/portable.txt
          zip -r ${{ matrix.artifact_name }} $FOLDER_NAME
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  publish-release:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -l release-files/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
