name: Release Portables

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: trix-portable-windows-x86_64.exe
            ext: ".exe"
            ffmpeg_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-win-64.zip"
            ffprobe_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-win-64.zip"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: trix-portable-linux-x86_64
            ext: ""
            ffmpeg_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-linux-64.zip"
            ffprobe_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-linux-64.zip"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: trix-portable-macos-x86_64
            ext: ""
            ffmpeg_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-osx-64.zip"
            ffprobe_url: "https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-osx-64.zip"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: trix-portable-macos-aarch64
            ext: ""
            ffmpeg_url: "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
            ffprobe_url: "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffprobe.zip"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libasound2-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      # Download static ffmpeg and ffprobe and place them in the src-rs/bin/ folder
      # so that they are embedded directly in the binary at compile time.
      - name: Download and extract static ffmpeg/ffprobe for embedding
        run: |
          mkdir -p src-rs/bin
          
          curl -L -o ffmpeg_dl ${{ matrix.ffmpeg_url }}
          curl -L -o ffprobe_dl ${{ matrix.ffprobe_url }}
          
          if [[ "${{ matrix.ffmpeg_url }}" == *.zip ]] || [[ "${{ matrix.target }}" == *darwin* ]]; then
            unzip -o ffmpeg_dl -d src-rs/bin/
            unzip -o ffprobe_dl -d src-rs/bin/
          elif [[ "${{ matrix.ffmpeg_url }}" == *.tar.xz ]]; then
            tar -xf ffmpeg_dl -C src-rs/bin/
            tar -xf ffprobe_dl -C src-rs/bin/
          fi
          
          rm -f ffmpeg_dl ffprobe_dl
          
          # Remove windows file extension if present so compile inclusion is unified
          if [ -f src-rs/bin/ffmpeg.exe ]; then
            mv src-rs/bin/ffmpeg.exe src-rs/bin/ffmpeg
          fi
          if [ -f src-rs/bin/ffprobe.exe ]; then
            mv src-rs/bin/ffprobe.exe src-rs/bin/ffprobe
          fi
          
          ls -la src-rs/bin/
        shell: bash

      - name: Build Rust binary
        run: cargo build --release --manifest-path src-rs/Cargo.toml --target ${{ matrix.target }}

      # Package the compiled binary directly
      - name: Prepare standalone binary
        run: |
          cp src-rs/target/${{ matrix.target }}/release/trix${{ matrix.ext }} ${{ matrix.artifact_name }}
          
          # Make sure binaries are executable on Unix systems
          if [ "${{ matrix.ext }}" = "" ]; then
            chmod +x ${{ matrix.artifact_name }}
          fi
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
